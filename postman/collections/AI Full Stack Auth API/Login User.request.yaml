$kind: http-request
url: "{{baseURL}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "heena@test.com",
      "password": "123456"
    }
scripts:
  - type: afterResponse
    code: |-
      let response = pm.response.json();
      pm.environment.set("token", response.token);
    language: text/javascript
order: 2000
