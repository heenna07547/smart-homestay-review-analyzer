$kind: http-example
request:
  url: http://localhost:5000/api/reviews
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "guestName": "Rohan Iyer",
        "hotelName": "Lakeview Cottage",
        "review": "Peaceful location with a great view of the lake. Would visit again.",
        "rating": 4
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "success": true,
        "message": "Review created",
        "data": {
          "_id": "665f1a2b3c4d5e6f78901236",
          "guestName": "Rohan Iyer",
          "hotelName": "Lakeview Cottage",
          "review": "Peaceful location with a great view of the lake. Would visit again.",
          "rating": 4,
          "createdAt": "2026-06-28T11:00:00.000Z",
          "updatedAt": "2026-06-28T11:00:00.000Z"
        }
      }
order: 1000
