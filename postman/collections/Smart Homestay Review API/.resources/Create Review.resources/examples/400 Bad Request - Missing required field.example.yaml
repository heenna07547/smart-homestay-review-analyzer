$kind: http-example
request:
  url: http://localhost:5000/api/reviews
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "guestName": "Rohan Iyer",
        "hotelName": "Lakeview Cottage"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Review validation failed: review: Path `review` is required., rating: Path `rating` is required."
      }
order: 2000
